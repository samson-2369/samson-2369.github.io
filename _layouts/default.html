<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/research-upgrade.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand-block">
        <a class="brand" href="/">{{ site.title }}</a>
        <p class="tagline">Cybersecurity · Critical Infrastructure · Signal &amp; Satellite</p>
      </div>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="/">Home</a>
        <a href="/research/">Research</a>
        <a href="/blog/">Blog</a>
        <a href="/projects/">Projects</a>
        <a href="/about/">About</a>
        <a href="/contact/">Contact</a>
      </nav>
    </div>
  </header>
  <main class="container content">
    {{ content }}
  </main>
  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© {{ "now" | date: "%Y" }} Norris Cornell · CornellSecurity.com</p>
      <p class="footer-note">Research and commentary based on publicly available information and independent analysis.</p>
    </div>
  </footer>
</body>
</html>
